<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Simulator — heyman.ai</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
    <h3>Wind Controls</h3>
    <label>Speed <span class="value" id="speedVal">5.0</span></label>
    <input type="range" id="windSpeed" min="0" max="20" step="0.1" value="5">
    <label>Direction <span class="value" id="dirVal">0&deg;</span></label>
    <input type="range" id="windDir" min="-90" max="90" step="1" value="0">
    <label>Turbulence <span class="value" id="turbVal">0.50</span></label>
    <input type="range" id="turbulence" min="0" max="2" step="0.05" value="0.5">
    <button id="resetBtn">Reset Flag</button>
</div>
<div id="hint">Drag to orbit &middot; Scroll to zoom</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
